pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }

// @react-native-async-storage/async-storage v3 ships org.asyncstorage.shared_storage:storage-android
// in this local repo (not on Maven Central). See: https://react-native-async-storage.github.io/async-storage/docs/Installation/#android
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        maven { url = uri("../node_modules/@react-native-async-storage/async-storage/android/local_repo") }
    }
}

rootProject.name = 'Tech_Erudite_Practical'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
